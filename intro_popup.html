<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLTV Extension</title>
    <link rel="stylesheet" href="styles/slider.css">
    <link rel="stylesheet" href="styles/popups.css">
    <link rel="icon" type="image/png" href="/icons/logo32.png">
</head>
<body>
    <h1>Settings</h1>
    <p class="sidenote">A refresh may be necessary to apply changes.</p>
    <a href="content_blocker_menu.html" class="button big_button">Customize content blocking</a>
    <table>
        <tr>
            <td>
                Show expected value for fantasy roles
            </td>
            <td>
                <label class="switch">
                    <input type="checkbox" id="role_exp_val">
                    <span class="slider round"></span>
                </label>
            </td>
        </tr>
        <tr>
            <td>
                Enable pinning events
            </td>
            <td>
                <label class="switch">
                    <input type="checkbox" id="pin_events">
                    <span class="slider round"></span>
                </label>
            </td>
        </tr>
    </table>
    <script src="scripts/vars.js"></script>
</body>
</html>
