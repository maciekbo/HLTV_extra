<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content blocking settings</title>
    <link rel="icon" type="image/png" href="/icons/logo32.png">
    <link rel="stylesheet" href="styles/slider.css">
    <link rel="stylesheet" href="styles/popups.css">
</head>
<body>
    <a href="intro_popup.html" class="button back_button">go back</a>
    <h1>Select which content to block</h1>
    <table>
        <tr>
            <td>
                Skins box on player profile
            </td>
            <td>
                <label class="switch">
                    <input type="checkbox" id="block_skins">
                    <span class="slider round"></span>
                </label>
            </td>
        </tr>
        <tr>
            <td>
                Player photos
            </td>
            <td>
                <label class="switch">
                    <input type="checkbox" id="block_player_photos">
                    <span class="slider round"></span>
                </label>
            </td>
        </tr>
    </table>
    <script src="scripts/blocker_script.js"></script>
</body>
</html>
